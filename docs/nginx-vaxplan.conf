# VaxPlan Nginx Configuration
# Place this file at: /etc/nginx/sites-available/vaxplan
# Then: sudo ln -sf /etc/nginx/sites-available/vaxplan /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vaxplan.org www.vaxplan.org;

    # Certbot ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vaxplan.org www.vaxplan.org;

    # ── SSL certificates (Let's Encrypt via certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/vaxplan.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaxplan.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload size (TIFF files can be up to 500 MB) ──────────────────────────
    client_max_body_size 512M;

    # ── Static file root (for uploads served directly) ───────────────────────
    # The app serves /uploads/* from disk; nginx forwards everything else.
    root /var/www/vaxplan;

    # ── Proxy all traffic to the Node.js app ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket support (Socket.IO, SSE)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers so Express can trust req.ip, req.protocol, etc.
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Increase timeouts for long-running TIFF ingestion requests
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;

        # Buffering — disable for SSE / streaming endpoints
        proxy_buffering off;
    }

    # ── Static uploads served directly by nginx (faster) ────────────────────
    location /uploads/ {
        alias /var/www/vaxplan/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/vaxplan.access.log;
    error_log  /var/log/nginx/vaxplan.error.log warn;
}
